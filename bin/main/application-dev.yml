logging:
  level:
    com.example.fileprocessor: DEBUG
    org.springframework.web.reactive: DEBUG
    reactor.netty: DEBUG

app:
  soap:
    endpoint: http://localhost:9000/soap/fileservice
    timeout-seconds: 5
    retry-attempts: 1
    retry-backoff-millis: 500
  document-rest:
    endpoint: http://localhost:3001
    list-path: /api/documents
    get-path: /api/document
    timeout-seconds: 5
