server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: file-processor-service
  r2dbc:
    url: r2dbc:h2:mem:///fileprocessor;DB_CLOSE_DELAY=-1
    username: sa
    password:
  h2:
    console:
      enabled: true
  webflux:
    multipart:
      max-in-memory-size: 10MB
      max-disk-usage-per-part: 10MB
      max-parts: 10
    hiddenmethod:
      filter:
        enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    com.example.fileprocessor: INFO
    reactor.netty: INFO
  pattern:
    console: "%-5level [%thread] %logger{36} - traceId=%X{traceId} - %msg%n"

app:
  file:
    max-size: 10485760
    allowed-types: pdf,txt,csv
    max-filename-length: 255
    max-file-size-mb: 50
    folders-to-skip:
      - "/tmp"
      - "/transient"
    keywords:
      - "test"
      - "mock"
    origin-patterns-to-send:
      - "incoming"
      - "documents"
  soap:
    endpoint: ${SOAP_ENDPOINT:http://localhost:9000/soap/fileservice}
    timeout-seconds: 30
    retry-attempts: 3
    retry-backoff-millis: 1000
  document-rest:
    endpoint: ${DOCUMENT_REST_ENDPOINT:http://localhost:3001}
    list-path: /api/documents
    get-path: /api/document
    products-path: /api/products
    product-documents-path: /api/products/{productId}/documents
    timeout-seconds: 15
  aws:
    s3:
      bucket-name: ${AWS_BUCKET:documents-bucket}
      region: ${AWS_REGION:us-east-1}
      endpoint: ${AWS_ENDPOINT:}
      path-style-access: false

---
spring:
  config:
    activate:
      on-profile: soap

---
spring:
  config:
    activate:
      on-profile: s3
  aws:
    s3:
      bucket-name: documents-bucket
      region: us-east-1
      endpoint: http://localhost:4566
      path-style-access: true
