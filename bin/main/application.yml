server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: file-processor-service
  webflux:
    hiddenmethod:
      filter:
        enabled: false
  r2dbc:
    url: r2dbc:h2:mem:///fileprocessor;DB_CLOSE_DELAY=-1
    username: sa
    password:
  master-r2dbc:
    url: r2dbc:h2:mem:///masterdb;DB_CLOSE_DELAY=-1
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    com.example.fileprocessor: INFO
    reactor.netty: INFO
  pattern:
    console: "%-5level [%thread] [%X{traceId}] %logger{36} - %msg%n"

app:
  soap:
    v2:
      endpoint: ${SOAP_V2_ENDPOINT:http://localhost:9000/soap/adminDocs}
      system-id: ${SOAP_V2_SYSTEM_ID:123}
      user-name: ${SOAP_V2_USER_NAME:775757775}
      header-namespace: ${SOAP_V2_HEADER_NS:http://prueba.com/ents/SOI/MessageFormat/V2.1}
      body-namespace: ${SOAP_V2_BODY_NS:http://prueba.com/intf/factory/adminDocs/V1.0}
      soap-namespace: ${SOAP_V2_NAMESPACE:http://schemas.xmlsoap.org/soap/envelope/}
      user-token: ${SOAP_V2_USER_TOKEN:}
      destination-name: ${SOAP_V2_DEST_NAME:bussinesdocs}
      destination-namespace: ${SOAP_V2_DEST_NS:http://prueba.com/intf/factory/adminDocs/Enlace/V1.0}
      destination-operation: ${SOAP_V2_DEST_OP:senddocs}
      soap-action: ${SOAP_V2_SOAP_ACTION:}
      classification: ${SOAP_V2_CLASSIFICATION:http://prueba.com/clas/AppsUpdated}
      message-context:
        key01: "value01"
        key02: "value02"
      meta-data:
        xIdentificadorFisico: "65464904"
        xFilial: "prueba"
      timeout-seconds: 30
      retry-attempts: 3
  document-rest:
    endpoint: ${DOCUMENT_REST_ENDPOINT:http://localhost:3001}
    products-path: /api/products
    product-documents-path: /api/products/{productId}/documents
    timeout-seconds: 15
  aws:
    s3:
      bucket-name: ${AWS_BUCKET:documents-bucket}
      region: ${AWS_REGION:us-east-1}
      endpoint: ${AWS_ENDPOINT:}
      path-style-access: false
      access-key: ${AWS_ACCESS_KEY:}
      secret-key: ${AWS_SECRET_KEY:}
      retry-attempts: 3
      retry-backoff-millis: 500
      timeout-seconds: 30
      key-prefix: "documents/"

  processors:
    s3:
      max-file-size-bytes: 52428800
      filename-pattern: ".*\\.(pdf|csv)$"
    soap:
      max-file-size-bytes: 10485760
      filename-pattern: ".*\\.(pdf|docx|txt)$"

  sync:
    sucursal-query: "SELECT sucursal FROM otro_esquema.tabla_maestra WHERE id_producto = :productId"
