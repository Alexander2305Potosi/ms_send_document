logging:
  level:
    com.example.fileprocessor: DEBUG
    org.springframework.web.reactive: DEBUG
    reactor.netty: DEBUG

app:
  processors:
    soap:
      max-size: 10485760
      allowed-types: pdf,txt,csv
  soap:
    endpoint: http://localhost:9000/soap/fileservice
    timeout-seconds: 5
    retry-attempts: 1
    retry-backoff-millis: 500
  document-rest:
    endpoint: http://localhost:3001
    products-path: /api/products
    product-documents-path: /api/products/{productId}/documents
    timeout-seconds: 5