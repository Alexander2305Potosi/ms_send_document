logging:
  level:
    com.example.fileprocessor: WARN
    org.springframework.web.reactive: WARN

server:
  shutdown: immediate

app:
  processors:
    soap:
      max-size: 5242880
      allowed-types: pdf,txt,csv
  soap:
    endpoint: ${SOAP_ENDPOINT:http://localhost:9000/soap/fileservice}
    timeout-seconds: 15
    retry-attempts: 2