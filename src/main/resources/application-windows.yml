# Perfil para Windows sin permisos de admin - usa puerto 9000
app:
  processors:
    soap:
      max-file-size-bytes: 10485760
      filename-pattern: ".*\\.(pdf|docx|txt)$"
  soap:
    endpoint: http://localhost:9000/soap/fileservice
    timeout-seconds: 5
    retry-attempts: 1
    retry-backoff-millis: 500