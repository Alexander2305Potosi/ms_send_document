server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: file-processor-service
  webflux:
    hiddenmethod:
      filter:
        enabled: false
  datasource:
    url: jdbc:h2:mem:fileprocessor;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    com.example.fileprocessor: INFO
    reactor.netty: INFO
  pattern:
    console: "%-5level [%thread] [%X{traceId}] %logger{36} - %msg%n"

app:
  soap:
    endpoint: ${SOAP_ENDPOINT:http://localhost:9000/soap/fileservice}
    timeout-seconds: 30
  document-rest:
    endpoint: ${DOCUMENT_REST_ENDPOINT:http://localhost:3001}
    products-path: /api/products
    product-documents-path: /api/products/{productId}/documents
    timeout-seconds: 15
  aws:
    s3:
      bucket-name: ${AWS_BUCKET:documents-bucket}
      region: ${AWS_REGION:us-east-1}
      endpoint: ${AWS_ENDPOINT:}
      path-style-access: false
      access-key: ${AWS_ACCESS_KEY:}
      secret-key: ${AWS_SECRET_KEY:}
      retry-attempts: 3
      retry-backoff-millis: 500
      timeout-seconds: 30
      key-prefix: "documents/"

  processors:
    s3:
      max-file-size-bytes: 52428800
      filename-pattern: ".*\\.(pdf|csv)$"
    soap:
      max-file-size-bytes: 10485760
      filename-pattern: ".*\\.(pdf|docx|txt)$"

---
spring:
  config:
    activate:
      on-profile: s3
app:
  aws:
    s3:
      bucket-name: documents-bucket
      region: us-east-1
      endpoint: http://localhost:4566
      path-style-access: true
      retry-attempts: 3
      retry-backoff-millis: 500
