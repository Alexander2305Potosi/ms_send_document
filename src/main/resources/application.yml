server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: file-processor-service
  webflux:
    multipart:
      max-in-memory-size: 10MB
      max-disk-usage-per-part: 10MB
      max-parts: 10
    hiddenmethod:
      filter:
        enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    com.example.fileprocessor: INFO
    reactor.netty: INFO
  pattern:
    console: "%-5level [%thread] %logger{36} - traceId=%X{traceId} - %msg%n"

app:
  file:
    max-size: 10485760
    allowed-types: pdf,docx,txt
    max-filename-length: 255
  soap:
    endpoint: ${SOAP_ENDPOINT:http://localhost:8081/soap/fileservice}
    timeout-seconds: 30
    retry-attempts: 3
    retry-backoff-millis: 1000
